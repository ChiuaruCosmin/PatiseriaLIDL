  <script>
    const itemDetailCard = document.querySelector('#itemDetailCard');
    const notificationDetailCard = document.querySelector('#notificationDetailCard');
    const profileCard = document.querySelector('#profileCard');
    const profileGlow = document.querySelector('#profileGlow');
    const detailItemIcon = document.querySelector('#detailItemIcon');
    const detailItemTitle = document.querySelector('#detailItemTitle');
    const detailItemText = document.querySelector('#detailItemText');

    function showItemDetail(iconSelector, title, description) {
      detailItemIcon.setAttribute('src', iconSelector);
      detailItemTitle.setAttribute('value', title);
      detailItemText.setAttribute('value', description);
      itemDetailCard.setAttribute('visible', true);
      notificationDetailCard.setAttribute('visible', false);
    }

    document.querySelector('#itemBtn1').addEventListener('click', function () {
      showItemDetail('#item1', 'Kraken Slayer (700g)', '+ Attack Damage\n+ Attack Speed\nBest when ahead in lane.');
    });

    document.querySelector('#itemBtn2').addEventListener('click', function () {
      showItemDetail('#item2', 'Core Item (1200g)', '+ Burst damage\n+ Ability Haste\nPairs with objective fights.');
    });

    document.querySelector('#itemBtn3').addEventListener('click', function () {
      showItemDetail('#item3', 'Infinity Edge (1900g)', '+ Crit multiplier\n+ Teamfight spike\nFinish after second core item.');
    });

    document.querySelector('#alertsCard').addEventListener('click', function () {
      notificationDetailCard.setAttribute('visible', true);
      itemDetailCard.setAttribute('visible', false);
    });

    document.querySelector('#profileCard').addEventListener('click', function () {
      const isActive = profileCard.getAttribute('data-active') === 'true';
      const nextState = !isActive;
      profileCard.setAttribute('data-active', String(nextState));
      profileGlow.setAttribute('material', 'opacity', nextState ? 0.3 : 0.07);
    });

    document.querySelector('#closeItemDetail').addEventListener('click', function () {
      itemDetailCard.setAttribute('visible', false);
    });

    document.querySelector('#closeNotificationDetail').addEventListener('click', function () {
      notificationDetailCard.setAttribute('visible', false);
    });
  </script>
</a-scene>
</body>
</html>
